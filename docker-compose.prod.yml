version: "3.8"

services:
  api:
    image: ghcr.io/keelfy/family-budget-app/api:latest
    env_file:
      - ./apps/api/.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - app-network

  web:
    image: ghcr.io/keelfy/family-budget-app/web:latest
    env_file:
      - ./apps/web/.env
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
